version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: neomarket_b2b_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neomarket_b2b
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: neomarket_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@neomarket.ru
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  b2b-service:
    build: .
    container_name: neomarket_b2b
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: neomarket_b2b
      DB_USER: postgres
      DB_PASS: postgres
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/neomarket_b2b
    volumes:
      - .:/app
      - ./migrations:/app/migrations
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  